name: Sync Airbnb Calendar

on:
  schedule:
    - cron: '7 * * * *'   # every hour, at :07
  workflow_dispatch: {}    # lets us trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync calendars from Airbnb
        env:
          AIRBNB_ICAL_URLS: ${{ secrets.AIRBNB_ICAL_URLS }}
        run: python3 scripts/sync_calendar.py

      - name: Commit availability.json if it changed
        run: |
          git config user.name "airbnb-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add availability.json
          if git diff --cached --quiet; then
            echo "No availability changes."
          else
            git commit -m "Auto-sync Airbnb availability"
            git push
          fi
